<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 웹사이트 로그인</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f5f5;
      margin:0;
      padding:0;
    }
    .wrap{
      max-width:500px;
      margin:60px auto;
      background:#fff;
      padding:30px;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }
    h1{
      text-align:center;
      margin-bottom:10px;
    }
    p{
      text-align:center;
      color:#666;
      margin-bottom:30px;
    }
    input{
      width:100%;
      padding:14px;
      margin-bottom:12px;
      border:1px solid #ddd;
      border-radius:8px;
      font-size:16px;
      box-sizing:border-box;
    }
    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:8px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      margin-bottom:10px;
    }
    .join-btn{ background:#2e7d32; color:#fff; }
    .login-btn{ background:#1565c0; color:#fff; }
    .logout-btn{ background:#c62828; color:#fff; }
    .box{
      display:none;
    }
    .box.active{
      display:block;
    }
    .msg{
      text-align:center;
      margin-top:15px;
      font-size:14px;
      color:#333;
      word-break:break-word;
    }
    .toggle{
      text-align:center;
      margin-top:15px;
      color:#1565c0;
      cursor:pointer;
      font-size:14px;
    }
    .user-card{
      background:#f0f7ff;
      border:1px solid #cfe3ff;
      padding:18px;
      border-radius:10px;
      margin-top:20px;
      text-align:center;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <h1>내 웹사이트</h1>
    <p>실제 회원가입 / 로그인 테스트</p>

    <!-- 회원가입 -->
    <div id="joinBox" class="box active">
      <input type="text" id="joinName" placeholder="이름" />
      <input type="email" id="joinEmail" placeholder="이메일" />
      <input type="password" id="joinPassword" placeholder="비밀번호 (6자 이상)" />
      <button class="join-btn" onclick="join()">회원가입</button>
      <div class="toggle" onclick="showLogin()">이미 계정이 있나요? 로그인</div>
    </div>

    <!-- 로그인 -->
    <div id="loginBox" class="box">
      <input type="email" id="loginEmail" placeholder="이메일" />
      <input type="password" id="loginPassword" placeholder="비밀번호" />
      <button class="login-btn" onclick="login()">로그인</button>
      <div class="toggle" onclick="showJoin()">처음이신가요? 회원가입</div>
    </div>

    <!-- 로그인 후 -->
    <div id="userBox" class="box">
      <div class="user-card">
        <h2 id="welcomeText">환영합니다</h2>
        <p id="userEmail"></p>
      </div>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCSm4_gjAHOIJsYaH2EJClDfXWSIsm5EbA",
      authDomain: "my-website-login-4bd29.firebaseapp.com",
      projectId: "my-website-login-4bd29",
      storageBucket: "my-website-login-4bd29.firebasestorage.app",
      messagingSenderId: "307088451969",
      appId: "1:307088451969:web:5c8c9f3c5fbae565122080",
      measurementId: "G-9EB15JLMNN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const msg = document.getElementById("msg");
    const joinBox = document.getElementById("joinBox");
    const loginBox = document.getElementById("loginBox");
    const userBox = document.getElementById("userBox");
    const welcomeText = document.getElementById("welcomeText");
    const userEmail = document.getElementById("userEmail");

    window.showLogin = function () {
      joinBox.classList.remove("active");
      loginBox.classList.add("active");
      userBox.classList.remove("active");
      msg.innerText = "";
    };

    window.showJoin = function () {
      joinBox.classList.add("active");
      loginBox.classList.remove("active");
      userBox.classList.remove("active");
      msg.innerText = "";
    };

    window.join = async function () {
      const name = document.getElementById("joinName").value.trim();
      const email = document.getElementById("joinEmail").value.trim();
      const password = document.getElementById("joinPassword").value.trim();

      if (!name || !email || !password) {
        msg.innerText = "이름 / 이메일 / 비밀번호를 모두 입력하세요.";
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(userCredential.user, { displayName: name });
        msg.innerText = "회원가입 성공!";
      } catch (error) {
        msg.innerText = "회원가입 실패: " + error.message;
      }
    };

    window.login = async function () {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      if (!email || !password) {
        msg.innerText = "이메일 / 비밀번호를 입력하세요.";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        msg.innerText = "로그인 성공!";
      } catch (error) {
        msg.innerText = "로그인 실패: " + error.message;
      }
    };

    window.logout = async function () {
      await signOut(auth);
      msg.innerText = "로그아웃 되었습니다.";
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        joinBox.classList.remove("active");
        loginBox.classList.remove("active");
        userBox.classList.add("active");
        welcomeText.innerText = `${user.displayName || "회원"}님 환영합니다`;
        userEmail.innerText = user.email || "";
      } else {
        joinBox.classList.add("active");
        loginBox.classList.remove("active");
        userBox.classList.remove("active");
      }
    });
  </script>

</body>
</html>
